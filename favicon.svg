<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Guitar body -->
  <ellipse cx="16" cy="22" rx="8" ry="7" fill="#c8853a" stroke="#7a4e1e" stroke-width="1.2"/>
  <!-- Waist -->
  <ellipse cx="16" cy="16" rx="4.5" ry="3" fill="#c8853a" stroke="#7a4e1e" stroke-width="1.2"/>
  <!-- Upper bout -->
  <ellipse cx="16" cy="11" rx="6.5" ry="5.5" fill="#c8853a" stroke="#7a4e1e" stroke-width="1.2"/>
  <!-- Sound hole -->
  <circle cx="16" cy="22" r="2.5" fill="#7a4e1e"/>
  <!-- Neck -->
  <rect x="14.5" y="1" width="3" height="7" rx="1" fill="#a0673a" stroke="#7a4e1e" stroke-width="0.8"/>
  <!-- Headstock -->
  <rect x="13.5" y="0" width="5" height="2.5" rx="1" fill="#7a4e1e"/>
  <!-- Fret lines -->
  <line x1="14.5" y1="3.5" x2="17.5" y2="3.5" stroke="#7a4e1e" stroke-width="0.6"/>
  <line x1="14.5" y1="5.5" x2="17.5" y2="5.5" stroke="#7a4e1e" stroke-width="0.6"/>
  <!-- Bridge -->
  <rect x="13" y="24.5" width="6" height="1.2" rx="0.5" fill="#7a4e1e"/>
</svg>
